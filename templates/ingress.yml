{{ if (default false .Values.ingress.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Values.appName }}-dev.raghudevopsb88.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.appName }}
            port:
              number: 80

{{ end }}
